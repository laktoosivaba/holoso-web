name: build

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (pushed to the registry configured in vars.IMAGE)"
        default: dev
      holoso_version:
        description: "Holoso release tag to vendor; leave empty for latest"
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3
        with:
          driver: remote
          endpoint: ${{ vars.BUILDKIT_HOST }}
          driver-opts: |
            cacert=/etc/ssl/certs/ca-certificates.crt
            cert=${{ vars.BUILDKIT_CERT }}
            key=${{ vars.BUILDKIT_KEY }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          build-args: |
            HOLOSO_VERSION=${{ inputs.holoso_version }}
          provenance: false
          outputs: type=image,name=${{ vars.IMAGE }}:${{ inputs.tag }},push=true,oci-mediatypes=true
