name: build

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (pushed to the registry configured in vars.IMAGE)"
        default: dev
      synth_ref:
        description: "Zubax/holoso ref to build the wheel from"
        default: main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check out holoso-synth (wheel source)
        uses: actions/checkout@v4
        with:
          repository: Zubax/holoso
          ref: ${{ inputs.synth_ref }}
          path: holoso-synth
          submodules: recursive

      - uses: docker/setup-buildx-action@v3
        with:
          driver: remote
          endpoint: ${{ vars.BUILDKIT_HOST }}
          driver-opts: |
            cacert=/etc/ssl/certs/ca-certificates.crt
            cert=${{ vars.BUILDKIT_CERT }}
            key=${{ vars.BUILDKIT_KEY }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          build-contexts: |
            holoso-synth=holoso-synth
          provenance: false
          outputs: type=image,name=${{ vars.IMAGE }}:${{ inputs.tag }},push=true,oci-mediatypes=true
