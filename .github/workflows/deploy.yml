name: deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: azure/setup-kubectl@v4
        with:
          version: ${{ vars.KUBECTL_VERSION }}

      - name: Rollout restart
        run: kubectl -n ${{ vars.K8S_NAMESPACE }} rollout restart deploy/${{ vars.K8S_DEPLOYMENT }}

      - name: Wait for rollout
        run: kubectl -n ${{ vars.K8S_NAMESPACE }} rollout status deploy/${{ vars.K8S_DEPLOYMENT }} --timeout=120s

      - name: Show pod state
        run: |
          kubectl -n ${{ vars.K8S_NAMESPACE }} get pods -l app=${{ vars.K8S_DEPLOYMENT }} \
            -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.spec.containers[?(@.name=="${{ vars.K8S_DEPLOYMENT }}")].image}{"\t"}{.status.containerStatuses[?(@.name=="${{ vars.K8S_DEPLOYMENT }}")].ready}{"\n"}{end}'
