<!doctype html>
<html lang=en>
<meta charset=utf-8>
<meta name=viewport content="width=device-width, initial-scale=1">
<title>holoso — Python → Verilog</title>
<style>
:root {
  --bd: #d4d4d4;
  --bg: #fafafa;
  --bg-alt: #f0f0f0;
  --accent: #2a82e0;
  --accent-hov: #1f6cb8;
  --log-bg: #1e1e1e;
  --log-fg: #d4d4d4;
  --log-err: #ff6e6e;
  --log-ok: #75d65f;
  --log-dim: #888;
}
* { box-sizing: border-box; }
body {
  margin: 0; padding: 10px 14px;
  font: 13px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  background: white; color: #222;
  display: flex; flex-direction: column; gap: 8px;
  height: 100dvh; overflow: hidden;
}
header { display: flex; align-items: baseline; gap: 12px; margin: 0; }
h1 { font-size: 1em; margin: 0; font-weight: 600; }
header .sub { color: #888; font-size: 0.85em; }
.pane { border: 1px solid var(--bd); border-radius: 4px; margin: 0; overflow: hidden; background: white; flex: 0 0 auto; }
.pane.fill { display: flex; flex-direction: column; min-height: 0; }
#output-pane { flex: 1 1 0; }
#src-pane { flex: 1 1 0; }
.maintabs { display: flex; gap: 6px; align-items: center; flex: 0 0 auto; }
.maintabs .grow { flex: 1; }
.maintabs button { font-size: 0.9em; }
.maintabs button.active { background: var(--accent); color: white; border-color: var(--accent); }
.view { display: none; }
.view.active { display: flex; flex-direction: column; gap: 8px; flex: 1 1 0; min-height: 0; }
.pane.fill > h2, .pane.fill > .tabs { flex: 0 0 auto; }
.pane > h2 {
  font-size: 0.8em; margin: 0; padding: 5px 10px;
  background: var(--bg); border-bottom: 1px solid var(--bd);
  font-weight: 600; color: #555; display: flex; align-items: center; gap: 6px;
}
.pane > h2 .grow { flex: 1; }
#src-editor, #out-editor, #out-frame, #out-resources { flex: 1 1 0; height: auto; min-height: 0; }
#out-frame { width: 100%; border: 0; background: white; display: none; }
#out-resources { display: none; flex-direction: column; }
.restoolbar {
  display: flex; gap: 10px; align-items: center; padding: 6px 10px; flex: 0 0 auto;
  background: var(--bg); border-bottom: 1px solid var(--bd);
}
#resources { flex: 1 1 0; min-height: 0; }
button {
  padding: 5px 12px; font: inherit; font-size: 0.9em; cursor: pointer;
  border: 1px solid #999; background: white; color: #222; border-radius: 3px;
}
button:hover:not(:disabled) { background: var(--bg-alt); }
button:disabled { opacity: 0.45; cursor: not-allowed; }
button.primary { background: var(--accent); color: white; border-color: var(--accent); }
button.primary:hover:not(:disabled) { background: var(--accent-hov); border-color: var(--accent-hov); }
.tabs {
  display: flex; padding: 4px 8px; gap: 4px; background: var(--bg);
  border-bottom: 1px solid var(--bd); min-height: 32px; align-items: center;
}
.tabs:empty::before { content: "no output yet"; color: #999; font-style: italic; }
.tabs button { padding: 3px 9px; font-size: 0.8em; }
.tabs button.active { background: var(--accent); color: white; border-color: var(--accent); }
.controls { display: flex; gap: 14px; align-items: center; margin: 0 4px; flex-wrap: wrap; flex: 0 0 auto; }
.controls label { display: flex; align-items: center; gap: 5px; }
.controls input[type=number] {
  width: 4.5em; padding: 4px 6px; font: inherit; font-size: 0.9em;
  border: 1px solid #999; border-radius: 3px;
}
select {
  padding: 3px 6px; font: inherit; font-size: 0.8em;
  border: 1px solid #999; background: white; color: #222; border-radius: 3px;
}
#log {
  height: 120px; margin: 0; padding: 8px 10px;
  background: var(--log-bg); color: var(--log-fg); font-size: 0.8em;
  overflow: auto; white-space: pre-wrap; word-break: break-word;
}
#log .err { color: var(--log-err); }
#log .ok  { color: var(--log-ok); }
#log .dim { color: var(--log-dim); }
.resbody { padding: 8px 10px; font-size: 0.85em; overflow: auto; }
.resbody .dim { color: #999; }
.resbody .err { color: #c0392b; white-space: pre-wrap; }
.resbody .head { margin-bottom: 6px; }
.resbody .head b { font-size: 1.2em; }
.resbody .chips { display: flex; flex-wrap: wrap; gap: 6px; margin: 6px 0; }
.resbody .chip { padding: 2px 8px; border: 1px solid var(--bd); border-radius: 10px; background: var(--bg); }
.resbody table { border-collapse: collapse; margin-top: 4px; }
.resbody td { padding: 1px 12px 1px 0; }
.resbody td.n { text-align: right; color: var(--accent); font-variant-numeric: tabular-nums; }
.resbody .warn { color: #b7791f; margin-top: 6px; white-space: pre-wrap; }
</style>

<header>
  <h1>holoso</h1>
  <span class=sub>Python&nbsp;→&nbsp;Verilog · synthesized in your browser (Pyodide)</span>
</header>

<nav class=maintabs id=main-tabs>
  <button id=tab-input class=active>Python input</button>
  <button id=tab-output>Output &amp; resources</button>
  <span class=grow></span>
  <span class=sub id=engine>starting engine…</span>
</nav>

<div class="view active" id=view-input>
  <div class="pane fill" id=src-pane>
    <h2>
      <span>src.py</span>
      <span class=grow></span>
      <label>example
        <select id=example title="load a demo kernel into the editor"></select>
      </label>
      <label>entry
        <select id=entry title="which function to synthesize (auto = last defined)">
          <option value="">(auto)</option>
        </select>
      </label>
    </h2>
    <div id=src-editor class=editor></div>
  </div>
  <div class=controls>
    <label>wexp <input id=wexp type=number value=8 min=2 max=15 step=1></label>
    <label>wman <input id=wman type=number value=24 min=4 max=52 step=1></label>
    <button id=synth class=primary disabled>Synthesize</button>
  </div>
</div>

<div class=view id=view-output>
  <div class="pane fill" id=output-pane>
    <div class=tabs id=out-tabs></div>
    <div id=out-editor class="editor short"></div>
    <iframe id=out-frame class="editor short" sandbox="allow-scripts" title="synthesis report"></iframe>
    <div id=out-resources>
      <div class=restoolbar>
        <label>target
          <select id=arch title="synthesis target for the resource estimate">
            <option value=generic>generic (gates)</option>
            <option value=ecp5>Lattice ECP5</option>
            <option value=xilinx>Xilinx 7-series</option>
            <option value=ice40>Lattice iCE40</option>
          </select>
        </label>
        <button id=estimate disabled title="run Yosys in your browser on the generated Verilog (downloads ~50 MB on first use)">Estimate</button>
      </div>
      <div id=resources class=resbody><span class=dim>synthesize a kernel, then estimate gate/FPGA resources</span></div>
    </div>
    <h2>
      <span>output</span>
      <span class=grow></span>
      <button id=download disabled>Download</button>
      <button id=download-all disabled title="all generated files + the Kulibin support RTL, as one .tar.gz">Download bundle</button>
    </h2>
  </div>
</div>

<div class=pane id=log-pane>
  <h2>log</h2>
  <pre id=log></pre>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.6/ace.min.js"></script>
<script type="module" src="app.js"></script>
