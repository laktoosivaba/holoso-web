<!doctype html>
<html lang=en>
<meta charset=utf-8>
<meta name=viewport content="width=device-width, initial-scale=1">
<link rel=icon href=favicon.png type=image/png>
<title>holoso — Python → Verilog</title>
<style>
:root {
  --bd: #d4d4d4;
  --bg: #fafafa;
  --bg-alt: #f0f0f0;
  --accent: #2a82e0;
  --accent-hov: #1f6cb8;
  --log-bg: #1e1e1e;
  --log-fg: #d4d4d4;
  --log-err: #ff6e6e;
  --log-ok: #75d65f;
  --log-warn: #e6c25f;
  --log-dim: #888;
  --success: #28a745;
  --success-hov: #218838;
}
* { box-sizing: border-box; }
body {
  margin: 0; padding: 10px 14px;
  font: 13px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  background: white; color: #222;
  display: flex; flex-direction: column; gap: 8px;
  height: 100dvh; overflow: hidden;
}
header { display: flex; align-items: baseline; gap: 12px; margin: 0; }
h1 { font-size: 1em; margin: 0; font-weight: 600; }
header .sub { color: #888; font-size: 0.85em; }
header .gh { margin-left: auto; color: #888; font-size: 0.85em; text-decoration: none; white-space: nowrap; }
header .gh:hover { color: #555; text-decoration: underline; }
.pane { border: 1px solid var(--bd); border-radius: 4px; margin: 0; overflow: hidden; background: white; flex: 0 0 auto; }
.pane.fill { display: flex; flex-direction: column; min-height: 0; }
#src-pane { flex: 1 1 0; }
.maintabs { display: flex; gap: 6px; align-items: center; flex: 0 0 auto; flex-wrap: wrap; }
.maintabs .grow { flex: 1; }
.maintabs button { font-size: 0.9em; }
.maintabs button.active { background: var(--accent); color: white; border-color: var(--accent); }
/* Per-view action groups on the right of the top nav (Run on input; Estimate/Route + selects on
   resources). display:contents lets each wrapper drop out of layout so its buttons participate
   directly in the maintabs flex; the body[data-view=…] rules below flip it to display:none to hide
   a whole group at once. */
.maintabs label { display: flex; align-items: center; gap: 4px; font-size: 0.8em; color: #555; }
.maintabs .sep { width: 1px; align-self: stretch; background: var(--bd); margin: 0 4px; }
.action-group { display: contents; }
body[data-view=input] .resources-only,
body[data-view=output] .input-only,
body[data-view=output] .resources-only,
body[data-view=resources] .input-only { display: none; }
.view { display: none; }
.view.active { display: flex; flex-direction: column; gap: 8px; flex: 1 1 0; min-height: 0; }
.pane.fill > h2, .pane.fill > .tabs { flex: 0 0 auto; }
.pane > h2 {
  font-size: 0.8em; margin: 0; padding: 5px 10px;
  background: var(--bg); border-bottom: 1px solid var(--bd);
  font-weight: 600; color: #555; display: flex; align-items: center; gap: 6px;
}
.pane > h2 .grow { flex: 1; }
#src-editor, #out-editor, #out-frame { flex: 1 1 0; height: auto; min-height: 0; }
#out-frame { width: 100%; border: 0; background: white; display: none; }

/* README onboarding pane: rendered Markdown shown in place of the editor when a README doc is the selected
   input. The content is trusted (the vendored Holoso release README or our own README_WEB.md), so app.js
   injects marked's HTML directly. Hidden by default; showReadme()/showEditorPane() toggle it against #src-editor. */
#readme-view {
  flex: 1 1 0; min-height: 0; overflow: auto; display: none; padding: 18px 26px;
  font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  font-size: 14px; line-height: 1.6; color: #222;
}
#readme-view > * { max-width: 820px; }          /* keep prose at a readable measure on wide screens */
#readme-view h1 { font-size: 1.6em; font-weight: 650; margin: 0 0 .4em; }
#readme-view h2 { font-size: 1.25em; font-weight: 650; margin: 1.5em 0 .5em; padding-bottom: .2em; border-bottom: 1px solid var(--bd); }
#readme-view h3 { font-size: 1.05em; font-weight: 650; margin: 1.2em 0 .4em; }
#readme-view p { margin: .6em 0; }
#readme-view ul, #readme-view ol { margin: .5em 0; padding-left: 1.5em; }
#readme-view li { margin: .25em 0; }
#readme-view a { color: var(--accent); text-decoration: none; }
#readme-view a:hover { text-decoration: underline; }
#readme-view code {
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  font-size: .88em; background: var(--bg-alt); padding: .12em .35em; border-radius: 3px;
}
#readme-view pre {
  background: var(--log-bg); color: var(--log-fg); padding: 12px 14px;
  border-radius: 5px; overflow: auto; margin: .8em 0;
}
#readme-view pre code { background: none; padding: 0; color: inherit; font-size: .85em; line-height: 1.5; }
#readme-view table { border-collapse: collapse; margin: .8em 0; font-size: .92em; }
#readme-view th, #readme-view td { border: 1px solid var(--bd); padding: 4px 10px; text-align: left; vertical-align: top; }
#readme-view th { background: var(--bg); font-weight: 650; }
#readme-view hr { border: 0; border-top: 1px solid var(--bd); margin: 1.6em 0; }
#readme-view blockquote { margin: .8em 0; padding: 0 12px; border-left: 3px solid var(--bd); color: #666; }
#readme-view .readme-dim { color: #999; font-style: italic; }
#readme-view .readme-err { color: #c0392b; }

/* Output / Resources views share a "tree | preview" split. The tree pane is fixed-width on the left,
   the preview pane (editor/iframe in Output; target chip + report + estimate controls in Resources)
   takes the rest. */
.split { display: flex; flex: 1 1 0; min-height: 0; gap: 8px; }
.tree-pane {
  flex: 0 0 300px; display: flex; flex-direction: column;
  border: 1px solid var(--bd); border-radius: 4px; background: white; overflow: hidden;
}
.tree-pane > h2 { flex: 0 0 auto; }
.tree {
  flex: 1 1 0; overflow: auto; padding: 4px 0; font-size: 0.85em; min-height: 0;
}
.tree:empty::before {
  content: "no files yet"; display: block; padding: 6px 12px; color: #999; font-style: italic;
}
.tree-footer {
  flex: 0 0 auto; display: flex; gap: 6px; padding: 5px 8px;
  background: var(--bg); border-top: 1px solid var(--bd);
}
.tree-footer button { font-size: 0.8em; padding: 3px 9px; flex: 1 1 0; }
/* min-width:max-content lets ul (and its rows) size to the widest leaf rather than the visible pane,
   so the active highlight's background fills the whole row when the tree is horizontally scrolled. */
.tree ul { list-style: none; margin: 0; padding: 0; min-width: max-content; }
.tree li { margin: 0; padding: 0; }
.tree .dir, .tree .file {
  display: flex; align-items: center; gap: 4px; padding: 2px 6px 2px 4px;
  cursor: pointer; user-select: none; white-space: nowrap;
}
.tree .dir:hover, .tree .file:hover:not(.disabled) { background: var(--bg-alt); }
.tree .file.active { background: var(--accent); color: white; }
/* Without this, an active row's :hover matches the grey :hover rule (higher specificity: two
   pseudo-classes vs. one extra class) and shows white text on grey. Pin it to a darker blue. */
.tree .file.active:hover:not(.disabled) { background: var(--accent-hov); color: white; }
.tree .file.disabled { color: #aaa; cursor: not-allowed; }
.tree .chev { display: inline-block; width: 12px; color: #888; flex: 0 0 12px; }
.tree .icon { width: 14px; text-align: center; flex: 0 0 14px; color: #888; }
.tree .file.active .icon { color: rgba(255, 255, 255, 0.85); }
/* Long names extend the row; .tree's overflow:auto exposes a horizontal scrollbar when needed.
   Full path is also surfaced via title-tooltip on hover. */
.tree .name { white-space: nowrap; }
.preview-pane { flex: 1 1 0; display: flex; flex-direction: column; min-height: 0; border: 1px solid var(--bd); border-radius: 4px; overflow: hidden; }

/* Resources preview-pane stack: target chip on top (single row, ellipsis on overflow) and the
   report below it. */
.res-target-bar {
  flex: 0 0 auto; padding: 6px 10px; background: var(--bg); border-bottom: 1px solid var(--bd);
  overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
}
.res-target-bar .target {
  font-size: 0.8em; color: #555; padding: 2px 8px; border: 1px solid var(--bd);
  border-radius: 3px; background: white;
}
.res-target-bar .target.empty { color: #999; font-style: italic; }
#resources { flex: 1 1 0; min-height: 0; padding: 8px 10px; font-size: 0.85em; overflow: auto; }
button {
  padding: 5px 12px; font: inherit; font-size: 0.9em; cursor: pointer;
  border: 1px solid #999; background: white; color: #222; border-radius: 3px;
}
button:hover:not(:disabled) { background: var(--bg-alt); }
button:disabled { opacity: 0.45; cursor: not-allowed; }
button.primary { background: var(--accent); color: white; border-color: var(--accent); }
button.primary:hover:not(:disabled) { background: var(--accent-hov); border-color: var(--accent-hov); }
button.success { background: var(--success); color: white; border-color: var(--success); }
button.success:hover:not(:disabled) { background: var(--success-hov); border-color: var(--success-hov); }
/* The active maintab is blue, but generic button:hover has matching specificity and trails in source
   order, so it would override to grey and make the white label unreadable. Pin the hover to blue. */
.maintabs button.active:hover:not(:disabled) {
  background: var(--accent-hov); border-color: var(--accent-hov); color: white;
}
select {
  padding: 3px 6px; font: inherit; font-size: 0.8em;
  border: 1px solid #999; background: white; color: #222; border-radius: 3px;
}
#log {
  height: 120px; margin: 0; padding: 8px 10px;
  background: var(--log-bg); color: var(--log-fg); font-size: 0.8em;
  overflow: auto; white-space: pre-wrap; word-break: break-word;
}
#log .err  { color: var(--log-err); }
#log .ok   { color: var(--log-ok); }
#log .warn { color: var(--log-warn); }
#log .dim  { color: var(--log-dim); }
#resources .dim { color: #999; }
#resources .err { color: #c0392b; white-space: pre-wrap; }
#resources .head { margin-bottom: 6px; }
#resources .head b { font-size: 1.2em; }
#resources .chips { display: flex; flex-wrap: wrap; gap: 6px; margin: 6px 0; }
#resources .chip { padding: 2px 8px; border: 1px solid var(--bd); border-radius: 10px; background: var(--bg); }
#resources table { border-collapse: collapse; margin-top: 4px; }
#resources td { padding: 1px 12px 1px 0; }
#resources td.n { text-align: right; color: var(--accent); font-variant-numeric: tabular-nums; }
#resources .warn { color: #b7791f; margin-top: 6px; white-space: pre-wrap; }
</style>

<header>
  <h1>holoso</h1>
  <span class=sub>Simple high-level synthesis of portable Verilog from idiomatic Python</span>
  <a class=gh href="https://github.com/Zubax/holoso" target=_blank rel="noopener noreferrer" title="Holoso on GitHub">GitHub ↗</a>
</header>

<nav class=maintabs id=main-tabs>
  <button id=tab-input class=active>Python input</button>
  <button id=tab-output>Output</button>
  <button id=tab-resources>Resources</button>
  <span class=grow></span>
  <span class="action-group input-only">
    <button id=run class=success disabled title="run the script in your browser (Pyodide)">Run</button>
  </span>
  <span class="action-group resources-only">
    <label>target
      <select id=arch title="synthesis target for the resource estimate">
        <option value=generic>generic (gates)</option>
        <option value=ecp5>Lattice ECP5</option>
        <option value=xilinx>Xilinx 7-series</option>
        <option value=ice40>Lattice iCE40</option>
      </select>
    </label>
    <button id=estimate disabled title="run Yosys in your browser on the selected .v (downloads ~50 MB on first use)">Estimate</button>
    <span class=sep></span>
    <label>ECP5
      <select id=ecp5-die title="ECP5 device — logic / DSP / BRAM capacity">
        <option value="--12k">12k</option>
        <option value="--25k">25k</option>
        <option value="--45k">45k</option>
        <option value="--85k" selected>85k</option>
      </select>
    </label>
    <label>package
      <select id=ecp5-pkg title="package — pin count / number of I/O pads"></select>
    </label>
    <button id=route disabled title="place &amp; route on Lattice ECP5 for real Fmax + post-route utilization (downloads ~170 MB of chipdb on first use)">Route</button>
  </span>
</nav>

<div class="view active" id=view-input>
  <div class=split>
    <div class=tree-pane>
      <div id=input-tree class=tree></div>
    </div>
    <div class="pane fill" id=src-pane>
      <h2><span id=src-filename>src.py</span></h2>
      <div id=src-editor class=editor></div>
      <div id=readme-view></div>
    </div>
  </div>
</div>

<div class=view id=view-output>
  <div class=split>
    <div class=tree-pane>
      <div id=output-tree class=tree></div>
      <div class=tree-footer>
        <button id=download disabled title="download the file selected in the tree">Download</button>
        <button id=download-all disabled title="all generated files (design + self-contained holoso_support.{v,vh}) as one .tar.gz">Bundle</button>
      </div>
    </div>
    <div class=preview-pane id=output-preview>
      <div id=out-editor class="editor short"></div>
      <iframe id=out-frame class="editor short" sandbox="allow-scripts" title="emitted artifact"></iframe>
    </div>
  </div>
</div>

<div class=view id=view-resources>
  <div class=split>
    <div class=tree-pane>
      <div id=resources-tree class=tree></div>
    </div>
    <div class=preview-pane>
      <div class=res-target-bar><span id=res-target class="target empty">no .v selected</span></div>
      <div id=resources><span class=dim>run a script that emits a .v file, then estimate gate/FPGA resources</span></div>
    </div>
  </div>
</div>

<div class=pane id=log-pane>
  <h2>log</h2>
  <pre id=log></pre>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.6/ace.min.js"></script>
<script type="module" src="app.js"></script>
